<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found – Liu GuangXuan</title>
    <style media="screen">
      body { background: #0f0f1a; color: rgba(255,255,255,0.87); font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
      #message { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); max-width: 400px; width: 90%; margin: auto; padding: 40px 32px 32px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
      #message h2 { color: #7c9ef8; font-size: 64px; font-weight: 700; margin: 0 0 8px; }
      #message h1 { font-size: 22px; font-weight: 300; color: rgba(255,255,255,0.85); margin: 0 0 16px; }
      #message p { line-height: 1.6; margin: 0 0 28px; font-size: 14px; color: rgba(255,255,255,0.55); }
      #message a { display: block; text-align: center; background: linear-gradient(135deg, #7c9ef8, #a78bfa); text-decoration: none; color: white; padding: 14px 20px; border-radius: 8px; font-weight: 600; letter-spacing: 0.5px; transition: opacity 0.2s; }
      #message a:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div id="message">
      <h2>404</h2>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist. Please check the URL or head back to the home page.</p>
